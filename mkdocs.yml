site_name: Personal Blog
site_description: A modern blog built with MkDocs and Python.
site_author: Blog Author

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - meta

nav:
  - Home: index.md
  - Blog:
      - My First Post: blog/post-1.md
      - Deploying to GitHub: blog/post-2.md
      - Blog Maintenance: blog/post-3.md
  - Tags: tags.md
